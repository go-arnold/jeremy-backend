services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.2
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    # Single-node and unsecured — fine for local/staging. Point production at
    # a managed cluster via ELASTICSEARCH_URL instead of relying on this.
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             (python manage.py search_index --create -f || echo 'Could not create search indices — continuing without search.') &&
             gunicorn artdukivu.wsgi:application --bind 0.0.0.0:8000 --workers 4 --worker-class gthread --threads 2 --timeout 120 --access-logfile -"
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: settings.production
      ELASTICSEARCH_URL: http://elasticsearch:9200
    ports:
      - "8000:8000"
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/mediafiles
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A artdukivu worker -l info -Q default,high_priority -c 4
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: settings.production
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on:
      api:
        condition: service_healthy

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      celery -A artdukivu beat -l info
        --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: settings.production
    depends_on:
      api:
        condition: service_healthy

volumes:
  static_files:
  media_files:
  es_data:
