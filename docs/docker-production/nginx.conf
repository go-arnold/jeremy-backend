# Reverse proxy for the Art du Kivu backend — HTTP API + WebSocket (chat en direct / présence).
# Mounted read-only at /etc/nginx/conf.d/default.conf inside the nginx container
# (see docker-compose.yaml in this folder).

upstream artdukivu_api {
    server api:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # Static files collected by `collectstatic`, served directly by nginx (faster than proxying
    # them through Gunicorn).
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        access_log off;
    }

    location /media/ {
        alias /app/mediafiles/;
        expires 7d;
        access_log off;
    }

    # WebSocket: chat en direct + présence (apps.realtime.routing / ws/live/<room_type>/<room_id>/).
    # This location MUST be declared before the generic "/" block below so the Upgrade headers
    # only apply here, not to ordinary HTTP requests.
    location /ws/ {
        proxy_pass http://artdukivu_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket connections are long-lived — nginx's default 60s proxy timeout would drop
        # otherwise-healthy chat/presence sockets well before the client intends to disconnect.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Live-stream HLS playback (self-hosted MediaMTX) — kept under this domain/HTTPS so
    # embedding an <hls.js> player on the site doesn't trigger mixed-content warnings.
    location /live-hls/ {
        proxy_pass http://mediamtx:8888/;
        # MediaMTX's HLS server does a cookie-check redirect on first request (Location:
        # /live/<key>/index.m3u8?cookieCheck=1) — it has no idea it's proxied under
        # /live-hls/, so without this rewrite the redirect escapes our prefix entirely and
        # falls through to the generic "/" location (Django), 404ing.
        proxy_redirect / /live-hls/;

        # HLS segment/playlist requests are short-lived — buffering (and the long default
        # timeouts meant for the API) would let a stuck upstream hang instead of failing fast,
        # another contributor to the perceived "stream repeats/stalls" symptom.
        proxy_buffering off;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;

        # MediaMTX ties each HLS viewer to a session via this same cookie, which the browser
        # will only send back cross-origin (frontend is on a different domain) if the response
        # allows credentialed requests. MediaMTX's own default CORS header is a wildcard
        # ("Access-Control-Allow-Origin: *"), which browsers reject outright once credentials
        # are involved — replace it with a reflection of the real request Origin instead.
        # Safe to reflect unconditionally: this cookie carries no account/auth capability (the
        # actual access control is the unguessable stream_key in the URL itself), only a
        # MediaMTX-internal viewer-session pointer.
        proxy_hide_header Access-Control-Allow-Origin;
        add_header 'Access-Control-Allow-Origin' $http_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
    }

    # Everything else: standard HTTP (REST API, Django admin, ReDoc/Swagger, allauth views).
    location / {
        proxy_pass http://artdukivu_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}

