# Reverse proxy for the Art du Kivu backend — HTTP API + WebSocket (chat en direct / présence).
# Mounted read-only at /etc/nginx/conf.d/default.conf inside the nginx container
# (see docker-compose.yaml in this folder).

upstream artdukivu_api {
    server api:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # Static files collected by `collectstatic`, served directly by nginx (faster than proxying
    # them through Gunicorn).
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        access_log off;
    }

    location /media/ {
        alias /app/mediafiles/;
        expires 7d;
        access_log off;
    }

    # WebSocket: chat en direct + présence (apps.realtime.routing / ws/live/<room_type>/<room_id>/).
    # This location MUST be declared before the generic "/" block below so the Upgrade headers
    # only apply here, not to ordinary HTTP requests.
    location /ws/ {
        proxy_pass http://artdukivu_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket connections are long-lived — nginx's default 60s proxy timeout would drop
        # otherwise-healthy chat/presence sockets well before the client intends to disconnect.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Live-stream HLS playback (self-hosted MediaMTX) — kept under this domain/HTTPS so
    # embedding an <hls.js> player on the site doesn't trigger mixed-content warnings.
    location /live-hls/ {
        proxy_pass http://mediamtx:8888/;
    }

    # Everything else: standard HTTP (REST API, Django admin, ReDoc/Swagger, allauth views).
    location / {
        proxy_pass http://artdukivu_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}

