# MediaMTX config — self-hosted replacement for Cloudflare Stream Live.
# Mounted read-only into the `mediamtx` service (see docker-compose.yaml).
# Requires the `-ffmpeg` image variant (see docker-compose.yaml) — runOnReady below shells out
# to ffmpeg, which the plain `FROM scratch` image cannot do.

rtmp: yes
rtmpAddress: :1935

hls: yes
hlsAddress: :8888
# mpegts (not the newer low-latency/fMP4 default) avoids chunked/part long-polling behavior that
# interacts badly with a plain reverse-proxy buffer — one of the two contributors (alongside
# stream_key reuse, fixed in apps/streaming/services.py) to the "stream repeats itself" bug.
hlsVariant: mpegts
# 5x2s = only 10s of buffer — too thin: any brief ffmpeg/network hiccup makes the player catch
# up to the live edge and stall waiting for the next segment (observed live: periodic loading
# spinner after a few minutes, recovers on its own). 8x2s = 16s gives real cushion against
# transient slowdowns at the cost of a few extra seconds of live latency — a good trade for a
# radio/webtv live stream, where sub-5s latency isn't the priority.
hlsSegmentCount: 8
hlsSegmentDuration: 2s

# Internal-only (never published to the host) — used by apps/streaming/client.py's
# kick_publisher() (force-disconnect on end_live) and list_ready_stream_keys() (polled every
# 15s by the apps.streaming.tasks.sync_live_status Celery task to detect connect/disconnect —
# the official MediaMTX image is `FROM scratch`, no shell/curl/wget, so it cannot run
# runOnReady/runOnNotReady hooks to push status changes to us; polling this API instead needs
# nothing inside this container beyond what it already serves natively).
api: yes
apiAddress: :9997

# MediaMTX's built-in default here restricts the "api"/"metrics"/"pprof" actions to requests
# originating from 127.0.0.1/::1 — confirmed live: apps.streaming.client.list_ready_stream_keys()
# (called by the `worker` container, a different IP on the docker network) got a 401
# "authentication error" from this exact endpoint every time. Port 9997 is never published to the
# host (see docker-compose.yaml) — only containers already inside this private compose network
# can reach it at all — so widening these three actions to any source IP here adds no real
# exposure. publish/read/playback keep the same unrestricted defaults they already had.
authInternalUsers:
  - user: any
    pass:
    ips: []
    permissions:
      - action: publish
      - action: read
      - action: playback
  - user: any
    pass:
    ips: []
    permissions:
      - action: api
      - action: metrics
      - action: pprof

# Every broadcast pushes to "live/<media_type>_<key>" (apps/streaming/services.py generates the
# key with that prefix). Each path pattern below transcodes the raw ingest into a
# quality/bitrate-controlled copy republished under "processed/live/<media_type>_<key>" — the
# ONLY path ever exposed for HLS playback (see apps/streaming/client.py build_playback_url).
# Viewers never see the raw ingest directly, so bad broadcaster-side bitrate/encoding never
# reaches them as-is.
#
# $MTX_PATH is deliberately used as-is (full "live/<key>"), not stripped down to just the key:
# shell parameter expansion (${MTX_PATH#live/}) was tried and confirmed live to break the hook
# entirely (no "processed/" path was produced at all) — however MediaMTX actually invokes
# runOnReady, it doesn't survive that expansion. Plain `$MTX_PATH` is proven to work, so the
# output path naturally becomes "processed/live/<key>" — apps/streaming/client.py's
# build_playback_url/kick_publisher match that real shape instead of fighting it.
paths:
  # Radio/Emissions/LiveMusic — audio-only. Strips video (-vn) and transcodes to AAC
  # 128kbps/44.1kHz: solid audio quality without the mobile-data cost of carrying video.
  "~^live/audio_(.+)$":
    runOnReady: ffmpeg -i rtmp://localhost:1935/$MTX_PATH -vn -c:a aac -b:a 128k -ar 44100 -f flv rtmp://localhost:1935/processed/$MTX_PATH
    runOnReadyRestart: yes

  # WebTV — video. Re-encodes to a controlled 720p/1.5Mbps ceiling (down from whatever
  # bitrate/resolution OBS pushes raw) plus the same AAC audio track.
  "~^live/video_(.+)$":
    runOnReady: ffmpeg -i rtmp://localhost:1935/$MTX_PATH -c:v libx264 -preset veryfast -b:v 1500k -maxrate 1500k -bufsize 3000k -vf scale=-2:720 -c:a aac -b:a 128k -f flv rtmp://localhost:1935/processed/$MTX_PATH
    runOnReadyRestart: yes

  # Transcoded output landing path — republished here by the ffmpeg hooks above (as
  # "processed/live/<key>", see the note above), this is what HLS/playback is actually served
  # from. Also recorded here (not the raw ingest) so the saved file matches exactly what
  # viewers watched. apps.streaming.tasks.finalize_live_recording (triggered from end_live)
  # uploads the finished segment to Cloudinary and deletes it locally; recordDeleteAfter is only
  # a backup cleanup net in case that upload step itself ever fails. recordSegmentDuration is
  # deliberately longer than any realistic single broadcast so one live session produces exactly
  # one file — a broadcast longer than 12h would split into multiple segments (not handled).
  "~^processed/live/(.+)$":
    record: yes
    recordPath: /recordings/%path/%Y-%m-%d_%H-%M-%S-%f
    recordFormat: fmp4
    recordSegmentDuration: 12h
    recordDeleteAfter: 24h
