# Vhost for art-du-kivu-api.kelor.tech.
#
# ⚠️ POST-CERTBOT VERSION — this reflects the file AS CERTBOT REWROTE IT, not the original
# HTTP-only starting point. Certbot has already run on this VPS (`sudo certbot --nginx -d
# art-du-kivu-api.kelor.tech`) and rewrote /etc/nginx/sites-available/art-du-kivu-api in place to
# add the `listen 443 ssl` block below + the HTTP->HTTPS redirect server block, using this file's
# location blocks as the starting point.
#
# THIS HAS BROKEN PRODUCTION TWICE: copying an older/regenerated version of this file over the
# live one silently deleted Certbot's HTTPS block, leaving port 443 falling through to a
# different vhost's certificate (net::ERR_CERT_COMMON_NAME_INVALID in the browser). Whenever you
# `sudo cp` this file over the live one to change a location block (e.g. buffering/timeouts):
#   1. Copy it as normal.
#   2. `sudo nginx -t` — if this now complains the file lacks a certificate/HTTPS block (or
#      HTTPS visibly breaks after `reload`), immediately re-run:
#      `sudo certbot --nginx -d art-du-kivu-api.kelor.tech` → choose
#      "1: Attempt to reinstall this existing certificate" (reuses the existing cert, no new
#      one issued, no rate-limit risk) — this regenerates the 443 block from the file you just
#      copied in.
#   3. Pull the resulting live file's content back into this repo file afterward (or at least
#      confirm it still matches) so the NEXT change starts from something already correct.
#
# Static/media are served directly by nginx (bind-mounted from the Docker `api` container's
# volumes — see docker-compose.yaml — into /opt/art-du-kivu-backend/{staticfiles,mediafiles}
# on the host), matching the alias pattern already used by icarm-api. Adjust the path below if
# you deploy this project somewhere other than /opt/art-du-kivu-backend.

server {
    server_name art-du-kivu-api.kelor.tech;

    client_max_body_size 50M;

    location /static/ {
        alias /opt/art-du-kivu-backend/staticfiles/;
    }

    location /media/ {
        alias /opt/art-du-kivu-backend/mediafiles/;
    }

    # WebSocket: chat en direct + présence (apps.realtime — ws/live/<room_type>/<room_id>/).
    # Declared before the generic "/" location so the Upgrade headers only apply here.
    location /ws/ {
        proxy_pass http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket connections are long-lived — nginx's default 60s proxy timeout would drop
        # otherwise-healthy chat/presence sockets well before the client disconnects.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Live-stream HLS playback (self-hosted MediaMTX) — kept under this domain/HTTPS so
    # embedding an <hls.js> player on the site doesn't trigger mixed-content warnings.
    location /live-hls/ {
        proxy_pass http://127.0.0.1:8888/;
        # MediaMTX's HLS server does a cookie-check redirect on first request (Location:
        # /live/<key>/index.m3u8?cookieCheck=1) — it has no idea it's proxied under
        # /live-hls/, so without this rewrite the redirect escapes our prefix entirely and
        # falls through to the generic "/" location (Django), 404ing.
        proxy_redirect / /live-hls/;

        # HLS segment/playlist requests are short-lived — buffering (and the long default
        # timeouts meant for the API) would let a stuck upstream hang instead of failing fast,
        # another contributor to the perceived "stream repeats/stalls" symptom. 10s read timeout
        # was too tight in practice (observed live: brief ffmpeg/network hiccups made nginx give
        # up on a segment request before MediaMTX could serve it, showing as a periodic
        # buffering spinner) — 20s gives real transcode hiccups room to recover.
        proxy_buffering off;
        proxy_read_timeout 20s;
        proxy_connect_timeout 5s;

        # MediaMTX ties each HLS viewer to a session via this same cookie, which the browser
        # will only send back cross-origin (frontend is on a different domain) if the response
        # allows credentialed requests. MediaMTX's own default CORS header is a wildcard
        # ("Access-Control-Allow-Origin: *"), which browsers reject outright once credentials
        # are involved — replace it with a reflection of the real request Origin instead.
        # Safe to reflect unconditionally: this cookie carries no account/auth capability (the
        # actual access control is the unguessable stream_key in the URL itself), only a
        # MediaMTX-internal viewer-session pointer.
        proxy_hide_header Access-Control-Allow-Origin;
        add_header 'Access-Control-Allow-Origin' $http_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
    }

    location / {
        proxy_pass http://127.0.0.1:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/art-du-kivu-api.kelor.tech/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/art-du-kivu-api.kelor.tech/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = art-du-kivu-api.kelor.tech) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name art-du-kivu-api.kelor.tech;
    return 404; # managed by Certbot
}
